# =============================================================================
# Grafana Datasource Provisioning — Prometheus
# =============================================================================
# This file is automatically loaded by Grafana on startup.
# Mount at: /etc/grafana/provisioning/datasources/prometheus.yml
# =============================================================================

apiVersion: 1

datasources:
  - name:      Prometheus
    type:      prometheus
    access:    proxy
    url:       http://prometheus:9090
    isDefault: true
    editable:  false
    jsonData:
      httpMethod:        POST
      timeInterval:      15s
      queryTimeout:      60s
      exemplarTraceIdDestinations: []
