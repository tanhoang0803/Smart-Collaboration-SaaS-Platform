# =============================================================================
# Smart Collaboration SaaS Platform — Nginx Production Config
# =============================================================================
# TLS 1.2/1.3 only, HSTS, security headers, gzip, rate limiting
# =============================================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  main;

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens   off;

    # Client body size limit (file uploads)
    client_max_body_size 10m;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/xhtml+xml
        application/atom+xml
        image/svg+xml
        font/ttf
        font/opentype
        application/vnd.ms-fontobject;

    # -------------------------------------------------------------------------
    # Rate limiting zones
    # -------------------------------------------------------------------------
    # 100 requests per minute per IP for unauthenticated traffic
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;
    # Stricter zone for auth endpoints
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # -------------------------------------------------------------------------
    # SSL session cache (shared across workers)
    # -------------------------------------------------------------------------
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # -------------------------------------------------------------------------
    # Upstream blocks
    # -------------------------------------------------------------------------
    upstream frontend {
        server frontend:80;
        keepalive 32;
    }

    upstream api_gateway {
        server api-gateway:8080;
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # HTTP server — redirect everything to HTTPS
    # (except ACME challenge for Let's Encrypt cert renewal)
    # -------------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Let's Encrypt ACME challenge passthrough
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS server — main production server
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        # ── TLS certificates ──────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # ── TLS hardening ─────────────────────────────────────────────────────
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256';
        ssl_prefer_server_ciphers off;

        # OCSP stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss:; font-src 'self'" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Apply general rate limit ───────────────────────────────────────────
        limit_req zone=general burst=20 nodelay;
        limit_req_status 429;

        # ── Common proxy headers (reused in location blocks) ──────────────────
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # ── REST API ──────────────────────────────────────────────────────────
        location /api/v1/ {
            proxy_pass http://api_gateway;

            # Auth endpoints get a stricter rate limit
            location /api/v1/auth/ {
                limit_req zone=auth burst=5 nodelay;
                proxy_pass http://api_gateway;
            }
        }

        # ── WebSocket (Socket.io) ─────────────────────────────────────────────
        location /socket.io/ {
            proxy_pass http://api_gateway;

            # WebSocket upgrade
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "Upgrade";

            # Long-lived connections — increase timeouts
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
        }

        # ── Frontend SPA ──────────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend;

            # Support client-side routing (React Router)
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        # SPA fallback: serve index.html for any unmatched path
        location @spa_fallback {
            proxy_pass http://frontend/index.html;
        }

        # ── Health check endpoint (no rate limit, no auth) ────────────────────
        location = /healthz {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
